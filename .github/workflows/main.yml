name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DATABASE_URL,JWT_SECRET,ALLOWED_ORIGINS
          script: |
            set -e

            cd /home/ec2-user/HomeSync

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing dependencies..."
            npm install

            echo "Building app..."
            npm run build

            echo "Running database setup..."
            psql "$DATABASE_URL" -f db/schema.sql
            psql "$DATABASE_URL" -f db/bootstrap.sql

            echo "Deploying frontend to nginx..."
            sudo rm -rf /usr/share/nginx/homesync/*
            sudo mkdir -p /usr/share/nginx/homesync
            sudo cp -r /home/ec2-user/HomeSync/frontend/dist/* /usr/share/nginx/homesync/
            sudo chown -R nginx:nginx /usr/share/nginx/homesync
            sudo chmod -R 755 /usr/share/nginx/homesync

            echo "Starting/reloading backend with PM2..."
            DATABASE_URL="$DATABASE_URL" \
            JWT_SECRET="$JWT_SECRET" \
            ALLOWED_ORIGINS="$ALLOWED_ORIGINS" \
            pm2 startOrReload ecosystem.config.cjs --env production --update-env

            pm2 save

            echo "Restarting nginx..."
            sudo systemctl restart nginx

            echo "Deployment complete."