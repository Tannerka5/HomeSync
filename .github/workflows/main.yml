name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /home/ec2-user/HomeSync

            git pull origin main
            npm install
            npm run build

            sudo rm -rf /usr/share/nginx/homesync/*
            sudo cp -r /home/ec2-user/HomeSync/frontend/dist/* /usr/share/nginx/homesync/
            sudo chown -R nginx:nginx /usr/share/nginx/homesync
            sudo chmod -R 755 /usr/share/nginx/homesync

            pm2 restart homesync-backend
            sudo systemctl restart nginx
